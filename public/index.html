<!DOCTYPE html>
<html>
<head>
    <title>QuickShare + Chat</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fafafa; display: flex; gap: 20px; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; flex: 1; }
        .chat-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9em; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>📤 Upload</h2>
    <input type="file" id="filePicker"><br><br>
    <label><input type="checkbox" id="makePublic"> Post to public feed</label><br><br>
    <button onclick="uploadFile()">Upload & Get Link</button>
    <p id="result"></p>
</div>

<div class="box">
    <h2>💬 Public Feed</h2>
    <div id="chatBox">Loading feed...</div>
</div>

<script>
    async function uploadFile() {
        const file = document.getElementById('filePicker').files[0];
        const isPublic = document.getElementById('makePublic').checked;
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('makePublic', isPublic);

        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        document.getElementById('result').innerHTML = `Link: <a href="${data.link}" target="_blank">Open File</a>`;
        loadChat();
    }

    async function loadChat() {
        const res = await fetch('/chat');
        const data = await res.json();
        const html = data.map(f => `
            <div class="chat-item">
                <strong>[${f.time}]</strong> Shared: 
                <a href="${f.link}" target="_blank">${f.name}</a>
            </div>
        `).join('');
        document.getElementById('chatBox').innerHTML = html || "No public files yet.";
    }

    setInterval(loadChat, 5000); // Refresh feed every 5s
    loadChat();
</script>
</body>
</html>
