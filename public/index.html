<!DOCTYPE html>
<html>
<head>
    <title>ZipHost Advanced</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; gap: 20px; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; flex: 1; }
        .advanced-toggle { color: #666; font-size: 0.8em; cursor: pointer; text-decoration: underline; }
        .hidden { display: none; }
        #advancedSection { margin-top: 10px; padding: 10px; background: #f9f9f9; border-radius: 5px; }
        .chat-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #eee; }
        .del-btn { background: #ff4d4d; color: white; border: none; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

<div class="box">
    <h2>📤 Upload</h2>
    <input type="file" id="filePicker"><br><br>
    
    <label><input type="checkbox" id="makePublic"> Post to public feed</label><br><br>
    
    <span class="advanced-toggle" onclick="document.getElementById('advancedSection').classList.toggle('hidden')">
        Advanced Settings
    </span>
    
    <div id="advancedSection" class="hidden">
        <label>Manual Entry Point (e.g. <code>home.html</code>):</label><br>
        <input type="text" id="entryPoint" placeholder="index.html">
    </div>

    <br><button onclick="uploadFile()" style="padding: 10px 20px;">Upload & Preview</button>
    <div id="result"></div>
</div>

<div class="box">
    <h2>💬 Public Feed</h2>
    <div id="chatBox"></div>
</div>

<script>
    async function uploadFile() {
        const file = document.getElementById('filePicker').files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);
        formData.append('makePublic', document.getElementById('makePublic').checked);
        formData.append('entryPoint', document.getElementById('entryPoint').value);

        document.getElementById('result').innerText = "Processing...";

        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        
        document.getElementById('result').innerHTML = `
            <p>Ready: <a href="${data.link}" target="_blank">Open Project</a></p>
            <button class="del-btn" onclick="deleteFile('${data.id}')">Delete Now</button>
        `;
        loadChat();
    }

    async function deleteFile(id) {
        await fetch('/delete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id })
        });
        document.getElementById('result').innerHTML = "";
        loadChat();
    }

    async function loadChat() {
        const res = await fetch('/chat');
        const data = await res.json();
        document.getElementById('chatBox').innerHTML = data.map(f => `
            <div class="chat-item">
                <a href="${f.link}" target="_blank">${f.name}</a>
                <button class="del-btn" onclick="deleteFile('${f.id}')">🗑️</button>
            </div>
        `).join('') || "No active shares.";
    }

    setInterval(loadChat, 5000);
    loadChat();
</script>
</body>
</html>
